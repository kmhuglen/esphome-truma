esphome:
  name: esp32-c6-3-supermini
  friendly_name: Bobil ESP32C6 Truma
  min_version: "2026.5.3"

external_components:
  - source:
      type: git
      url: https://github.com/havanti/esphome-truma
      ref: main
    components: [truma_inetbox, uart]
    refresh: always

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
    version: recommended

logger:
  # Global level is the ceiling for per-tag levels, so it must be VERY_VERBOSE
  # for the LIN tag below to emit VERY_VERBOSE output.
  level: VERY_VERBOSE
  baud_rate: 115200
  logs:
    # Show every raw LIN frame the ESP receives (RX-path / bus diagnostics)
    truma_inetbox.LinBusListener: VERY_VERBOSE
    # Quiet the noisy subsystems so the LIN traffic stays readable
    esp32_ble: INFO
    esp32_ble_tracker: INFO
    esp32_ble_client: INFO
    bluetooth_proxy: INFO
    wifi: INFO
    sensor: INFO

debug:
  update_interval: 10s

api:
  encryption:
    key: !secret api_key_3_supermini

ota:
  - platform: esphome
    password: !secret ota_password_3_supermini
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid_rv
  password: !secret wifi_password
  output_power: 15.0dBm

  on_connect:
    then:
      - lambda: 'id(wifi_ok) = true;'

  on_disconnect:
    then:
      - lambda: 'id(wifi_ok) = false;'
          
  # Use IP/DNS to override mDNS lookup
  use_address: esp32c6-truma.local.rv

  ap:
    ssid: "Esp32-C6-3 Fallback Hotspot"
    password: !secret wifi_password

captive_portal:

# Enable the ESP32's onboard Bluetooth hardware
esp32_ble_tracker:
    scan_parameters:
      interval: 100ms
      window: 80ms
      active: true

# Enable the Bluetooth Proxy component
bluetooth_proxy:
  active: true

uart:
  - id: lin_uart_bus
    tx_pin: GPIO7
    rx_pin: GPIO6
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 2

time:
  - platform: homeassistant
    id: homeassistant_time
    # Push the correct time to the Truma CP Plus clock on every sync
    on_time_sync:
      then:
        - truma_inetbox.clock.set:

truma_inetbox:
  uart_id: lin_uart_bus
  lin_checksum: VERSION_2
  time_id: homeassistant_time
  # Record the time of every valid frame received from the heater (RX/link health)
  on_heater_message:
    then:
      - lambda: 'id(truma_last_contact) = millis();'

# ─── Onboard RGB LED state machine ───────────────────────────────────────────
# Green flash (every 2 s):  CP Plus connected – LIN bus active
# Blue flash  (~300 ms):    TX command sent to heater
# Red flash   (every 2 s):  Wi-Fi disconnected
# Off:                      Wi-Fi up but CP Plus not connected
globals:
  - id: led_color  # 1 = green (alive)  2 = blue (TX)  3 = red (no Wi-Fi)
    type: int
    restore_value: no
    initial_value: '0'
  - id: led_ticks  # Countdown in 100 ms steps
    type: int
    restore_value: no
    initial_value: '0'
  - id: wifi_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: truma_last_contact  # millis() of last received Truma frame (0 = none since boot)
    type: uint32_t
    restore_value: no
    initial_value: '0'

interval:
  - interval: 2s        # Status: green = CP Plus alive, red = no Wi-Fi
    then:
      - lambda: |-
          if (!id(wifi_ok)) { id(led_color) = 3; id(led_ticks) = 5; }
          else if (id(cp_plus_alive).state) { id(led_color) = 1; id(led_ticks) = 5; }
  - interval: 100ms     # LED driver: show color, count down ticks
    then:
      - lambda: |-
          if (id(led_ticks) > 0) {
            id(led_ticks) -= 1;
            auto call = id(board_rgb_led)->turn_on();
            if      (id(led_color) == 1) call.set_rgb(0.0, 1.0, 0.0);  // green
            else if (id(led_color) == 2) call.set_rgb(0.0, 0.3, 1.0);  // blue
            else                         call.set_rgb(1.0, 0.0, 0.0);  // red
            call.set_brightness(0.15);
            call.set_transition_length(0);
            call.perform();
          } else {
            auto call = id(board_rgb_led)->turn_off();
            call.set_transition_length(0);
            call.perform();
          }

light:
  - platform: esp32_rmt_led_strip
    id: board_rgb_led
    pin: GPIO8
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    internal: true

sensor:
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: uptime_seconds
    update_interval: 60s

  - platform: internal_temperature
    name: "Internal Temperature"
    update_interval: 60s

  - platform: debug
    free:
      id: heap_free_bytes
      name: "Heap free bytes"

  - platform: debug
    loop_time:
      name: "CPU Loop Time"

  - platform: truma_inetbox
    name: "Current Room Temperature"
    type: CURRENT_ROOM_TEMPERATURE

  - platform: truma_inetbox
    name: "Current Water Temperature"
    type: CURRENT_WATER_TEMPERATURE

  - platform: truma_inetbox
    name: "Target Room Temperature Status"
    type: TARGET_ROOM_TEMPERATURE

  - platform: truma_inetbox
    name: "Target Water Temperature Status"
    type: TARGET_WATER_TEMPERATURE

  - platform: truma_inetbox
    name: "Heating Mode"
    type: HEATING_MODE

  - platform: truma_inetbox
    name: "Electric Power Level Status"
    type: ELECTRIC_POWER_LEVEL

  - platform: truma_inetbox
    name: "Energy Mix Status"
    type: ENERGY_MIX

  - platform: truma_inetbox
    name: "Operating Status"
    type: OPERATING_STATUS

  - platform: truma_inetbox
    name: "Heater Error Code"
    type: HEATER_ERROR_CODE

  - platform: template
    name: "Truma Time Since Contact"
    id: truma_time_since_contact
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: 5s
    device_class: duration
    state_class: measurement
    entity_category: diagnostic
    lambda: |-
      if (id(truma_last_contact) == 0) return 9999.0;  // no frame received since boot
      return (millis() - id(truma_last_contact)) / 1000.0;

button:
  - platform: restart
    name: "Restart"

  - platform: safe_mode
    name: "Restart in Safe Mode"

  - platform: template
    name: "Energy mix GAS only"
    on_press:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: GAS

  - platform: template
    name: "Energy mix MIX 1"
    on_press:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: MIX
          watt: 900W

  - platform: template
    name: "Energy mix MIX 2"
    on_press:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: MIX
          watt: 1800

  - platform: template
    name: "Energy mix ELECTRICITY 1"
    on_press:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: ELECTRICITY
          watt: 900W

  - platform: template
    name: "Energy mix ELECTRICITY 2"
    on_press:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: ELECTRICITY
          watt: 1800W

  - platform: template
    name: "Set electric power level to 0 Watt"
    on_press:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_electric_power_level: 0

  - platform: template
    name: "Set electric power level to 900 Watt"
    on_press:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_electric_power_level: 900

  - platform: template
    name: "Set electric power level to 1800 Watt"
    on_press:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_electric_power_level: 1800

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    bssid:
      name: "Connected BSSID"
    mac_address:
      name: "MAC Address"

  - platform: version
    name: "ESPHome Version"

  - platform: truma_inetbox
    name: "ESPHome Truma Version"

  - platform: template
    name: "Uptime Human Readable"
    update_interval: 60s
    lambda: |-
      uint32_t dur = (uint32_t) id(uptime_seconds).state;
      int days = dur / 86400;
      dur %= 86400;
      int hours = dur / 3600;
      dur %= 3600;
      int minutes = dur / 60;
      int seconds = dur % 60;
      char buffer[32];
      if (days > 0) {
        sprintf(buffer, "%dd %02dh %02dm %02ds", days, hours, minutes, seconds);
      } else {
        sprintf(buffer, "%02dh %02dm %02ds", hours, minutes, seconds);
      }
      return {buffer};

binary_sensor:
  - platform: status
    name: "ESP Status"

  - platform: truma_inetbox
    name: "CP Plus alive"
    type: CP_PLUS_CONNECTED
    id: cp_plus_alive

  - platform: truma_inetbox
    name: "Room Heater active"
    type: HEATER_ROOM
    id: HEATER_ROOM

  - platform: truma_inetbox
    name: "Water Heater active"
    type: HEATER_WATER
    id: HEATER_WATER

  - platform: truma_inetbox
    name: "Heater mode Gas"
    type: HEATER_GAS

  - platform: truma_inetbox
    name: "Heater mode Mix 1"
    type: HEATER_MIX_1

  - platform: truma_inetbox
    name: "Heater mode Mix 2"
    type: HEATER_MIX_2

  - platform: truma_inetbox
    name: "Heater mode Elec"
    type: HEATER_ELECTRICITY

  - platform: truma_inetbox
    name: "Heater has error"
    type: HEATER_HAS_ERROR

  - platform: truma_inetbox
    name: "Timer active"
    type: TIMER_ACTIVE
    id: TIMER_ACTIVE

  - platform: truma_inetbox
    name: "Timer Room Heater active"
    type: TIMER_ROOM

  - platform: truma_inetbox
    name: "Timer Water Heater active"
    type: TIMER_WATER

climate:
  - platform: truma_inetbox
    name: "Truma Room"
    type: ROOM

  - platform: truma_inetbox
    name: "Truma Water"
    type: WATER

number:
  - platform: truma_inetbox
    name: "Target Room Temperature"
    type: TARGET_ROOM_TEMPERATURE

  - platform: truma_inetbox
    name: "Target Water Temperature"
    type: TARGET_WATER_TEMPERATURE

  - platform: truma_inetbox
    name: "Electric Power Level"
    type: ELECTRIC_POWER_LEVEL

  - platform: template
    name: "Timer Room Temperature"
    id: timer_room_temperature
    optimistic: true
    restore_value: true
    min_value: 5
    max_value: 30
    step: 1
    initial_value: 19
    unit_of_measurement: "°C"
    mode: box
    entity_category: config

datetime:
  - platform: template
    name: "Timer Start"
    id: timer_start
    type: time
    optimistic: true
    restore_value: true
    initial_value: "07:00:00"
    entity_category: config

  - platform: template
    name: "Timer Stop"
    id: timer_stop
    type: time
    optimistic: true
    restore_value: true
    initial_value: "09:30:00"
    entity_category: config

switch:
  - platform: template
    name: "Activate Room Heater"
    lambda: |-
      return id(HEATER_ROOM).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 19
          heating_mode: ECO
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 0

  - platform: template
    name: "Activate Water Heater"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_water_temperature:
          temperature: 40
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_water_temperature:
          temperature: 0

  - platform: template
    name: "Activate Water Heater (enum)"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_water_temperature_enum:
          temperature: ECO
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_water_temperature_enum: "OFF"

  - platform: template
    name: "Activate Timer"
    lambda: |-
      return id(TIMER_ACTIVE).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.timer.activate:
          start: !lambda 'return id(timer_start).hour * 60 + id(timer_start).minute;'
          stop: !lambda 'return id(timer_stop).hour * 60 + id(timer_stop).minute;'
          room_temperature: !lambda 'return (int) id(timer_room_temperature).state;'
          heating_mode: ECO
          water_temperature: 0
          energy_mix: GAS
          watt: 0
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.timer.disable

select:
  - platform: truma_inetbox
    name: "Energy Mix"
    type: HEATER_ENERGY_MIX_GAS

  - platform: truma_inetbox
    name: "Fan Mode"
    type: HEATER_FAN_MODE_COMBI

