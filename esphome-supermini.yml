esphome:
  name: esp32-c6-3-supermini
  friendly_name: Bobil ESP32C6 Truma

  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: board_rgb_led
          brightness: 100%
          red: 100%
          green: 100%
          blue: 100%
          effect: none

external_components:
  - source:
      type: git
      url: https://github.com/havanti/esphome-truma
      ref: main
    components: [truma_inetbox, uart]
    refresh: always

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
    version: recommended

logger:
  level: DEBUG
  baud_rate: 115200

debug:
  update_interval: 10s

api:
  encryption:
    key: !secret api_key_3_supermini

ota:
  - platform: esphome
    password: !secret ota_password_3_supermini
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid_rv
  password: !secret wifi_password

  on_connect:
    then:
      - light.turn_on:
          id: board_rgb_led
          brightness: 30%
          red: 100%
          green: 65%
          blue: 0%
          effect: none

  on_disconnect:
    then:
      - light.turn_on:
          id: board_rgb_led
          brightness: 100%
          red: 100%
          green: 0%
          blue: 0%
          effect: blink_red
          
  ap:
    ssid: "Esp32-C6-3 Fallback Hotspot"
    password: !secret wifi_password

captive_portal:

# Enable the ESP32's onboard Bluetooth hardware
esp32_ble_tracker:
    scan_parameters:
      interval: 1100ms
      window: 1100ms
      active: true

# Enable the Bluetooth Proxy component
bluetooth_proxy:
  active: true

uart:
  - id: lin_uart_bus
    tx_pin: GPIO7
    rx_pin: GPIO6
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 2

truma_inetbox:
  uart_id: lin_uart_bus
  lin_checksum: VERSION_2

light:
  - platform: esp32_rmt_led_strip
    name: "Power LED"
    id: board_rgb_led
    pin: GPIO8
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    effects:
      - pulse:
          name: blink_red
          transition_length: 500ms
          update_interval: 500ms
          min_brightness: 0%
          max_brightness: 100%

sensor:
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: uptime_seconds
    update_interval: 60s

  - platform: internal_temperature
    name: "Internal Temperature"
    update_interval: 60s

  - platform: debug
    free:
      id: heap_free_bytes
      name: "Heap free bytes"

  - platform: debug
    loop_time:
      name: "CPU Loop Time"

  - platform: truma_inetbox
    name: "Current Room Temperature"
    type: CURRENT_ROOM_TEMPERATURE

  - platform: truma_inetbox
    name: "Current Water Temperature"
    type: CURRENT_WATER_TEMPERATURE

  - platform: truma_inetbox
    name: "Target Room Temperature Status"
    type: TARGET_ROOM_TEMPERATURE

  - platform: truma_inetbox
    name: "Target Water Temperature Status"
    type: TARGET_WATER_TEMPERATURE

  - platform: truma_inetbox
    name: "Heating Mode"
    type: HEATING_MODE

  - platform: truma_inetbox
    name: "Electric Power Level Status"
    type: ELECTRIC_POWER_LEVEL

  - platform: truma_inetbox
    name: "Energy Mix Status"
    type: ENERGY_MIX

  - platform: truma_inetbox
    name: "Operating Status"
    type: OPERATING_STATUS

  - platform: truma_inetbox
    name: "Heater Error Code"
    type: HEATER_ERROR_CODE

button:
  - platform: restart
    name: "Restart"

  - platform: safe_mode
    name: "Restart in Safe Mode"

  - platform: template
    name: "Energy mix GAS only"
    on_press:
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: GAS

  - platform: template
    name: "Energy mix MIX 1"
    on_press:
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: MIX
          watt: 900W

  - platform: template
    name: "Energy mix MIX 2"
    on_press:
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: MIX
          watt: 1800

  - platform: template
    name: "Energy mix ELECTRICITY 1"
    on_press:
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: ELECTRICITY
          watt: 900W

  - platform: template
    name: "Energy mix ELECTRICITY 2"
    on_press:
      - truma_inetbox.heater.set_energy_mix:
          energy_mix: ELECTRICITY
          watt: 1800W

  - platform: template
    name: "Set electric power level to 0 Watt"
    on_press:
      - truma_inetbox.heater.set_electric_power_level: 0

  - platform: template
    name: "Set electric power level to 900 Watt"
    on_press:
      - truma_inetbox.heater.set_electric_power_level: 900

  - platform: template
    name: "Set electric power level to 1800 Watt"
    on_press:
      - truma_inetbox.heater.set_electric_power_level: 1800

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    bssid:
      name: "Connected BSSID"
    mac_address:
      name: "MAC Address"

  - platform: version
    name: "ESPHome Version"

  - platform: truma_inetbox
    name: "ESPHome Truma Version"

  - platform: template
    name: "Uptime Human Readable"
    update_interval: 60s
    lambda: |-
      uint32_t dur = (uint32_t) id(uptime_seconds).state;
      int days = dur / 86400;
      dur %= 86400;
      int hours = dur / 3600;
      dur %= 3600;
      int minutes = dur / 60;
      int seconds = dur % 60;
      char buffer[32];
      if (days > 0) {
        sprintf(buffer, "%dd %02dh %02dm %02ds", days, hours, minutes, seconds);
      } else {
        sprintf(buffer, "%02dh %02dm %02ds", hours, minutes, seconds);
      }
      return {buffer};

binary_sensor:
  - platform: status
    name: "ESP Status"

  - platform: truma_inetbox
    name: "CP Plus alive"
    type: CP_PLUS_CONNECTED
    id: cp_plus_alive

  - platform: truma_inetbox
    name: "Room Heater active"
    type: HEATER_ROOM
    id: HEATER_ROOM

  - platform: truma_inetbox
    name: "Water Heater active"
    type: HEATER_WATER
    id: HEATER_WATER

  - platform: truma_inetbox
    name: "Heater mode Gas"
    type: HEATER_GAS

  - platform: truma_inetbox
    name: "Heater mode Mix 1"
    type: HEATER_MIX_1

  - platform: truma_inetbox
    name: "Heater mode Mix 2"
    type: HEATER_MIX_2

  - platform: truma_inetbox
    name: "Heater mode Elec"
    type: HEATER_ELECTRICITY

  - platform: truma_inetbox
    name: "Heater has error"
    type: HEATER_HAS_ERROR

  - platform: truma_inetbox
    name: "Timer active"
    type: TIMER_ACTIVE
    id: TIMER_ACTIVE

  - platform: truma_inetbox
    name: "Timer Room Heater active"
    type: TIMER_ROOM

  - platform: truma_inetbox
    name: "Timer Water Heater active"
    type: TIMER_WATER

climate:
  - platform: truma_inetbox
    name: "Truma Room"
    type: ROOM

  - platform: truma_inetbox
    name: "Truma Water"
    type: WATER

number:
  - platform: truma_inetbox
    name: "Target Room Temperature"
    type: TARGET_ROOM_TEMPERATURE

  - platform: truma_inetbox
    name: "Target Water Temperature"
    type: TARGET_WATER_TEMPERATURE

  - platform: truma_inetbox
    name: "Electric Power Level"
    type: ELECTRIC_POWER_LEVEL

switch:
  - platform: template
    name: "Activate Room Heater"
    lambda: |-
      return id(HEATER_ROOM).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 19
          heating_mode: ECO
    turn_off_action:
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 0

  - platform: template
    name: "Activate Water Heater"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_water_temperature:
          temperature: 40
    turn_off_action:
      - truma_inetbox.heater.set_target_water_temperature:
          temperature: 0

  - platform: template
    name: "Activate Water Heater (enum)"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_water_temperature_enum:
          temperature: ECO
    turn_off_action:
      - truma_inetbox.heater.set_target_water_temperature_enum: "OFF"

  - platform: template
    name: "Active Timer"
    lambda: |-
      return id(TIMER_ACTIVE).state;
    turn_on_action:
      - truma_inetbox.timer.activate:
          start: 7:00
          stop: 9:30
          room_temperature: 13
          heating_mode: ECO
          water_temperature: 0
          energy_mix: GAS
          watt: 0
    turn_off_action:
      - truma_inetbox.timer.disable

select:
  - platform: truma_inetbox
    name: "Energy Mix"
    type: HEATER_ENERGY_MIX_GAS

  - platform: truma_inetbox
    name: "Fan Mode"
    type: HEATER_FAN_MODE_COMBI

web_server:
  port: 80
  version: 3
  local: true